<body>
    <div class="navbar">

 <div class="container">
    <div class="forms">
          <h2>Create Account Now</h2>
        <form action="">

           <label for="name">Enter Your Name</label>
<input type="text" name="name" id="name">
<small id="nameError" class="error"></small>

<label for="email">Enter Email ID</label>
<input type="email" name="email" id="email" required>
<small id="emailError" class="error"></small>
<label for="password">Enter Your Password</label>
<input type="password" name="password" id="password">
<small id="passwordError" class="error"></small>
         <input type="submit" value="submit" id="submit">
         <button type="button" id="googleSignIn" class="google-btn">
     <span>Sign in with Google</span> <i class="fa-brands fa-google"></i>
</button>
            <p>Already Have an Account? <a href="Login.html" id="para"> Login Now</a></p>
        </form>
    </div>
</div>

<script>

    let nameInput = document.getElementById("name");
    let emailInput = document.getElementById("email");
    let passwordInput = document.getElementById("password");

    // Error message elements
    let nameError = document.getElementById("nameError");
let emailError = document.getElementById("emailError");
let passwordError = document.getElementById("passwordError");
   
   
   
    nameInput.addEventListener("input", function () {

        let namePattern = /^[A-Za-z ]+$/;

        if (nameInput.value.trim() == "") {
            nameError.textContent = "Name cannot be empty";
        }

        else if (!nameInput.value.match(namePattern)) {
            nameError.textContent = "Name must contain only letters";
        }

        else if (nameInput.value.length < 3) {
            nameError.textContent = "Name must be at least 3 characters";
        }

        else {
            nameError.textContent = "";
        }

    });

    emailInput.addEventListener("input", function () {

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if (!emailInput.value.match(emailPattern)) {
            emailError.textContent = "Enter valid email";
        }

        else {
            emailError.textContent = "";
        }

    });


    passwordInput.addEventListener("input", function () {

        let password = passwordInput.value;

        let upperCase = /[A-Z]/;
        let lowerCase = /[a-z]/;
        let number = /[0-9]/;
        let specialChar = /[!@#$%^&*(),.?":{}|<>]/;

        if (password.length < 8) {
            passwordError.textContent =
                "Password must be at least 8 characters";
        }

        else if (!upperCase.test(password)) {
            passwordError.textContent =
                "Password must contain an uppercase letter";
        }

        else if (!lowerCase.test(password)) {
            passwordError.textContent =
                "Password must contain a lowercase letter";
        }

        else if (!number.test(password)) {
            passwordError.textContent =
                "Password must contain a number";
        }

        else if (!specialChar.test(password)) {
            passwordError.textContent =
                "Password must contain a special character";
        }

        else {
            passwordError.style.color = "lightgreen";
            passwordError.textContent = "Strong Password";
        }

    });

 </script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDL_fcHMqPF26LrcaDgy6BSTSDx3iWT-XE",
  authDomain: "fake-news-detection-f9154.firebaseapp.com",
  projectId: "fake-news-detection-f9154",
  storageBucket: "fake-news-detection-f9154.firebasestorage.app",
  messagingSenderId: "327331005701",
  appId: "1:327331005701:web:1c80a10522f4251d10636c"
};


// Initialize Firebase
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


// FORM
const form = document.querySelector("form");

form.addEventListener("submit", async function(event){

    event.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const userCredential =
        await createUserWithEmailAndPassword(
            auth,
            email,
            password
        );

        await updateProfile(userCredential.user, {
            displayName: name || email.split("@")[0]
        });

        localStorage.setItem("loggedInUserName", name || email.split("@")[0]);

        window.location.href = "index.html";

        console.log(userCredential.user);

    }

    catch(error){

        alert("Email Already Exits, Use new Email");

        console.log(error);

    }

});
const googleBtn = document.getElementById("googleSignIn");

googleBtn.addEventListener("click", async () => {

    const provider = new GoogleAuthProvider();

    try {

        const result = await signInWithPopup(
            auth,
            provider
        );

        const user = result.user;

        console.log("Name:", user.displayName);
        console.log("Email:", user.email);

        localStorage.setItem(
            "loggedInUserName",
            user.displayName || (user.email ? user.email.split("@")[0] : "User")
        );

        alert("Google Login Successful");

        window.location.href = "index.html";

    }
    catch(error){

        console.error(error);
        alert(error.message);

    }

});
</script>
