<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Now</title>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body{
        
           font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           background: linear-gradient(to right,#390434,#853d14);  

        }
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        #logo{
            font-size: 20px;
            text-decoration: solid;
            color: white;
            font-family: monospace;
        }

    .google-btn{
        width:100%;
        padding:10px;
        margin-top:10px;
        border:none;
        border-radius:8px;
        background:white;
        color:black;
        font-size:16px;
        cursor:pointer;
    }

    .google-btn:hover{
        background:#f1f1f1;
    }
        #navig ul{
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding:0;
            
        }
        #navig ul li a{
            text-decoration: none;
            color: white;
            font-size: 18px;
            
        }

        #navig ul li a:hover{
            color: yellow;
        }

        .container{
            display: flex;
            justify-content: center;

            align-items: center;
            height: 85vh;
        }

        .forms{
            width: 320px;
            padding: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
            color: white;
        }

        .forms h2{
            text-align: center;
            margin-bottom: 25px;
            color: #ffcc70;
        }

        .forms label{
            font-size: 15px;
        }

         .forms input[type="text"]{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 18px;

            border: none;
            border-radius: 8px;

            background: #f1f1f1;
            font-size: 14px;
        }

        .forms input[type="password"]
        {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background: #f1f1f1;
            font-size: 14px; 
        }

        .forms input[type="submit"]{
            width: 100%;
            padding: 10px;

            border: none;
            border-radius: 8px;

            background: #ffb347;
            color: black;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;
            transition: 0.3s;
        }

          .forms input[type="submit"]:hover{
            background: #ffcc70;
        }

          nav {
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            background: rgb(51, 26, 2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
           
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        #para{
            color:red;
            text-decoration:none;
        }


    </style>
</head>
<body>
    <nav>
   <div class="logo">
            FakeXpose AI <i class="fa-solid fa-shield"></i>
        </div>
  <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="signup.html">Signup</a>
 </div>
    </nav>
 
    </div>
 <div class="container">
    <div class="forms">
          <h2>Login Now</h2>
        <form action="">
            <label for="name">Enter Email ID</label><br>
            <input type="text" name="name" id="name" required><br>

            <label for="password">Enter Your password</label><br>
            <input type="password" name="password" id="password">
            <p>Forgot password? <a href="passreset" id="para"> Click Here</a></p><br>

            <input type="submit" value="submit">
            <button type="button" id="googleSignIn" class="google-btn">
            <i class="fa-brands fa-google"></i> Login with Google
            </button>
            <p>Don't Have an Account? <a href="signup.html" id="para"> Signup Now</a></p>
        </form>
    </div>
</div>
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";


import {
    getAuth,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


// Firebase Configuration

const firebaseConfig = {

    apiKey: "AIzaSyDL_fcHMqPF26LrcaDgy6BSTSDx3iWT-XE",

    authDomain: "fake-news-detection-f9154.firebaseapp.com",

    projectId: "fake-news-detection-f9154",

    storageBucket: "fake-news-detection-f9154.firebasestorage.app",

    messagingSenderId: "327331005701",

    appId: "1:327331005701:web:1c80a10522f4251d10636c"

};


//  Firebase

const app = initializeApp(firebaseConfig);


const auth = getAuth(app);

//Email Pass Login

const form = document.querySelector("form");


form.addEventListener("submit", async(e)=>{

    e.preventDefault();


    const email =
    document.getElementById("name").value;


    const password =
    document.getElementById("password").value;



    try{

        const userCredential =
        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );


        const user=userCredential.user;


        console.log("Logged in:",user.email);

        localStorage.setItem(
            "loggedInUserName",
            user.displayName || (user.email ? user.email.split("@")[0] : "User")
        );


        alert("Login Successful");


        window.location.href="index.html";


    }

    catch(error){


        console.log(error);


        if(error.code==="auth/invalid-credential")
        {
            alert("Invalid Email or Password");
        }

        else if(error.code==="auth/user-not-found")
        {
            alert("Account does not exist. Please signup");
        }

        else
        {
            alert(error.message);
        }

    }


});


//Login With Google

const googleBtn =
document.getElementById("googleSignIn");



googleBtn.addEventListener("click",async()=>{


    const provider =
    new GoogleAuthProvider();



    try{


        const result =
        await signInWithPopup(
            auth,
            provider
        );


        const user=result.user;


        console.log(
            "Google User:",
            user.displayName,
            user.email
        );

        localStorage.setItem(
            "loggedInUserName",
            user.displayName || (user.email ? user.email.split("@")[0] : "User")
        );


        alert("Google Login Successful");


        window.location.href="index.html";


    }


    catch(error){


        console.log(error);

        alert(error.message);

    }



});


</script>
</body>
</html>
