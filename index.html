<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        :root {
    --primary: #b6665f;
    --secondary: #55f7df86;
    --success: #22c55e;
    --danger: #b42323;
    --warning: #f59e0b;
    --bg-dark: #081d4d;
    --bg-card: rgba(30, 41, 59, 0.7);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(21, 6, 59, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
   background-color: var(--bg-dark);
    color: var(--text-main);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 4.5rem;
}

h1, h2, h3 {
    font-weight: 800;
}

.gradient-text {
    background: linear-gradient(135deg, var(--text-main), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}


/* Navigation */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 0.75rem 5% 1rem;
    z-index: 10;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
}

.hero {
    text-align: center;
    padding: 4rem 5%;
    max-width: 1000px;
    margin: 0 auto;
}

h1 {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    margin-bottom: 1.5rem;
    line-height: 1.1;
}

.subtitle {
    font-size: 1.25rem;
    color: var(--text-muted);
    margin-bottom: 3rem;
}


        .container {
            width: min(900px, calc(100% - 2rem));
            min-height: 220px;
            margin: 2rem auto;
            padding: 1.75rem;
            border-radius: 28px;
            background: rgba(37, 58, 112, 0.92);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        h2 {
            text-align: center;
            width: 100%;
        }

        textarea {
            width: min(100%, 640px);
            min-height: 120px;
            padding: 1rem 1.1rem;
            margin: 0;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.05rem;
            resize: none;
            display: block;
            text-align: left;
            line-height: 1.4;
            overflow-y: auto;
            
            outline: none;
        }

        textarea::placeholder {
            text-align: left;
            color: rgba(248, 250, 252, 0.55);
            font-size: 1.05rem;
        }

        button {
            width: 40%;
            margin-top: 15px;
            padding: 10px;
            background: linear-gradient(135deg, var(--danger), var(--warning));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: 0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .real {
            background: #d4edda;
            color: #155724;
        }

        .fake {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
     <nav>
        <div class="logo">InfoShield <i class="fa-solid fa-shield"></i></div>
        <div class="nav-links">
          <button id="config-btn" class="secondary-btn">Configuration</button>  
        </div>
    </nav>


<div class="container">
    <h2>Fake News Detector</h2>

    <textarea id="newsInput" placeholder="Paste news here..."></textarea>

    <button onclick="checkNews()">Check News</button>

    <div id="resultBox" class="result"></div>
</div>
<footer>InfoShield AI, All Rights are Reserved</footer>
<script>
async function checkNews() {
    const text = document.getElementById("newsInput").value;
    const resultBox = document.getElementById("resultBox");

    if (!text.trim()) {
        alert("Please enter some news text!");
        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result";
    resultBox.innerHTML = "Checking... ";

    try {
        // Replace with your backend API URL
        const response = await fetch("http://localhost:5000/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ news: text })
        });

        const data = await response.json();

        // Example response format:
        // { label: "FAKE", confidence: 0.92 }

        if (data.label === "REAL") {
            resultBox.classList.add("real");
            resultBox.innerHTML = `SReal News <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        } else {
            resultBox.classList.add("fake");
            resultBox.innerHTML = ` Fake News <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        }

    } catch (error) {
        resultBox.classList.add("fake");
        resultBox.innerHTML = "Error connecting to server!";
    }
}
</script>

</body>
</html>
