<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
  <style>
:root {
    --primary: #b6665f;
    --secondary: #55f7df86;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg-dark: #081d4d;
    --bg-card: rgba(30, 41, 59, 0.85);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.08);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #081d4d, #0f172a);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* NAVBAR */

nav {
    width: 100%;
    padding: 1rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    background: rgba(8, 29, 77, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--glass-border);
    z-index: 100;
}

.logo {
    font-size: 1.8rem;
    font-weight: 700;
    color: white;
}

.secondary-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
}

.secondary-btn:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN CONTAINER */

.container {
    width: min(900px, 92%);
    margin: auto;
    margin-top: 140px;
    padding: 2rem;
    border-radius: 28px;
    background: var(--bg-dark);
    backdrop-filter: blur(14px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);

    display: flex;
    flex-direction: column;
    align-items: center;
} 



h2 {
    margin-bottom: 1.5rem;
    font-size: 2rem;
    text-align: center;
}

/* TEXTAREA */

textarea {
    width: 100%;
    min-height: 180px;
    padding: 1rem;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 1rem;
    resize: none;
    outline: none;
    transition: 0.3s ease;
}

textarea:focus {
    border-color: var(--secondary);
    box-shadow: 0 0 15px rgba(85,247,223,0.2);
}

textarea::placeholder {
    color: rgba(255,255,255,0.5);
}

/* BUTTON */

button {
    margin-top: 1.5rem;
    padding: 14px 24px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--danger), var(--warning));
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
}

/* RESULT */

.result {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 14px;
    display: none;
    text-align: center;
    font-weight: 600;
}
/* 
.real {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.3);
}

.fake {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
} */

/* FOOTER */

footer {
    text-align: center;
    padding: 1.2rem;
    color: var(--text-muted);
    margin-top: auto;
    font-size: 0.95rem;
}

/* RESPONSIVE */

@media (max-width: 768px) {
    .container {
        margin-top: 120px;
        padding: 1.5rem;
    }

    h2 {
        font-size: 1.6rem;
    }

    textarea {
        min-height: 150px;
    }

    .logo {
        font-size: 1.4rem;
    }
}

.text{
    padding: 100px;
    padding-bottom: 20px;
    color: red;
}
.main-title{
    margin-top: 110px;
    text-align: center;
    padding-top: 80px;
    
    /* font-weight: 700; */
    color: white;
    letter-spacing: 2px;
}

.main-title h1{
    font-size: 3rem; 
}
</style>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
     <nav>
        <div class="logo">FakeXpose AI <i class="fa-solid fa-shield"></i></div>
        <div class="nav-links">
          <button id="config-btn" class="secondary-btn">Configuration</button>  
        </div>
    </nav>
<div class="main-title">
     <h1>AI FAKE INFORMATION DETECTOR</h1>
     <p>Find, Verify and Detect Fake Information.</p>

</div>

<div class="container">
    <h2>Fake Information Detector</h2>

    <textarea id="newsInput" placeholder="Paste News, Information here..."></textarea>

    <button onclick="checkNews()">Check News</button>

    <div id="resultBox" class="result"></div>
</div>
<footer>FakeXpose AI, All Rights are Reserved</footer>
<script>
async function checkNews() {
    const text = document.getElementById("newsInput").value;
    const resultBox = document.getElementById("resultBox");

    if (!text.trim()) {
        alert("Please enter some news text!");
        return;
    }

    resultBox.style.display = "block";
    resultBox.className = "result";
    resultBox.innerHTML = "Checking... ";

    try {
        // Replace with your backend API URL
        const response = await fetch("http://localhost:5000/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ news: text })
        });

        const data = await response.json();

        // Example response format:
        // { label: "FAKE", confidence: 0.92 }

        if (data.label === "REAL") {
            resultBox.classList.add("real");
            resultBox.innerHTML = `SReal News <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        } else {
            resultBox.classList.add("fake");
            resultBox.innerHTML = ` Fake News <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        }

    } catch (error) {
        resultBox.classList.add("fake");
        resultBox.innerHTML = "Error connecting to server!"; 
    }
}
</script>  

</body>
</html>
